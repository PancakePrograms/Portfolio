<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi</title>
    <link rel="stylesheet" href="Upal.css">
</head>
<body>

<div class = "game">

    <div id="stats"></div>

    <div id="clock">
        <span id="hours">01</span>
        <span>:</span>
        <span id="minutes">00</span>
        <span id="am">am</span>
        <span id="pm">pm</span>
    </div>

    <div class="screen">
      <img class="climate" src = "Character.gif">
      <img class="poop" src = "poop.gif">
</div>

    <div class="actions">
        <button class="cycle" onclick="food()"></button>
        
        <button class="select" onclick="select()"></button>
        
        <button class="clean" onclick="clean()"></button>
    </div>

    <button class='extra'>Options</button>
    </div>

    <div id="popup">
      <label for="hours">Hours</label>
      <output>0</output>
        <input type="range" name="hours" id="hourVal" min="0" max="12" oninput="this.previousElementSibling.value = this.value">
        <label>Minutes</label>
        <output>00</output>
        <input type="range" id="minVal" min="0" max="59" oninput="this.previousElementSibling.value=this.value">
        
        <div class="dayCycle">
        <input type="radio" name="dayNight" value="am" checked>
        <label>am</label>
        <input type="radio" name="dayNight" value="pm">
        <label>pm</label>
        </div>
         
        <button onclick="submit()">Submit</button>
    </div>

    <script src="Upal.js"></script>
</body>
</html>
